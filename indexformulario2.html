<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario 2</title>
    <h1>Registrar el robo de la bicicleta:</h1>
</head>
<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Información sobre el incidente:</legend>
            
            <p>
                <label for="fecha">Día del robo:</label><br>
                <input type="date" id="fecha" name="fecha" tabindex="1" autofocus required>
            </p>

            <p>
                <label for="hora">Hora aproximada:</label><br>
                <input type="time" id="hora" name="hora" tabindex="2">
            </p>
        </fieldset>

        <br>

    </form>   
</body>
</html>
